# CI/CD workflow for MCP Vikunja
# Consolidated single workflow handling all scenarios without duplication

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ Code is not formatted. Run 'go fmt ./...'"
            echo "$unformatted"
            exit 1
          fi
          echo "✅ Code formatting OK"

      - name: Check imports
        run: |
          unformatted=$(goimports -l .)
          if [ -n "$unformatted" ]; then
            echo "❌ Imports need formatting. Run 'goimports -w .'"
            echo "$unformatted"
            exit 1
          fi
          echo "✅ Imports formatting OK"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=10m

      - name: Run go vet
        run: go vet ./...

      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ -n "$(git diff)" ]; then
            echo "❌ go mod tidy produced changes. Run 'go mod tidy' and commit."
            git diff
            exit 1
          fi
          echo "✅ go mod tidy OK"

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: vikunja
          POSTGRES_USER: vikunja
          POSTGRES_PASSWORD: vikunja
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vikunja"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        volumes:
          - pgdata:/var/lib/postgresql/data
      vikunja:
        image: vikunja/vikunja:latest
        env:
          VIKUNJA_SERVICE_JWTSECRET: devsecret
          VIKUNJA_SERVICE_TIMEZONE: UTC
          VIKUNJA_DATABASE_TYPE: postgres
          VIKUNJA_DATABASE_HOST: localhost
          VIKUNJA_DATABASE_PASSWORD: vikunja
          VIKUNJA_DATABASE_DATABASE: vikunja
        ports:
          - 3456:3456
        options: >-
          --health-cmd "curl -f http://localhost:3456/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      matrix:
        go-version: ['1.26']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Create test user and get token
        run: |
          # Wait for Vikunja to be ready
          for i in {1..30}; do
            if curl -sf http://localhost:3456/health > /dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          
          # Create user and get token
          curl -s -X POST http://localhost:3456/v1/user \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"testpass123","username":"testuser"}' || true
          
          TOKEN=$(curl -s -X POST http://localhost:3456/v1/login \
            -H "Content-Type: application/json" \
            -d '{"email":"test@example.com","password":"testpass123"}' | jq -r '.token')
          echo "VIKUNJA_HOST=http://localhost:3456" >> $GITHUB_ENV
          echo "VIKUNJA_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Run tests with integration tag
        run: go test -race -tags=integration -coverprofile=coverage.out ./...

      - name: Verify coverage threshold
        run: |
          coverage=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${coverage}%"
          if (( $(echo "$coverage < 60" | bc -l) )); then
            echo "❌ Coverage below 60%"
            exit 1
          fi
          echo "✅ Coverage threshold met"

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate, test]
    strategy:
      matrix:
        go-version: ['1.26']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build mcp-vikunja
        run: go build -o bin/mcp-vikunja ./cmd/mcp-vikunja

      - name: Build vikunja-cli
        run: go build -o bin/vikunja-cli ./cmd/vikunja-cli

      - name: Verify binaries
        run: |
          ls -lh bin/
          test -f bin/mcp-vikunja
          test -f bin/vikunja-cli
          echo "✅ Both binaries built successfully"

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, test, build]
    # Only release on main branch pushes by @meschbach
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor == 'meschbach'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Bump version and push tag
        uses: anothrNick/github-tag-action@v1
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          DRY_RUN: true
      - name: Build release artifacts
        run: |
          chmod +x release.sh
          ./release.sh

      - name: Push version tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            release/mcp-vikunja_*.tgz

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push mcp-vikunja docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: "linux/amd64,linux/arm64"
          file: cmd/mcp-vikunja/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
      - name: Generate release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -lh release/mcp-vikunja_*.tgz | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY

  status:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [validate, test, build, release]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.validate.result }}" == "failure" ] || \
             [ "${{ needs.test.result }}" == "failure" ] || \
             [ "${{ needs.build.result }}" == "failure" ]; then
            echo "❌ Required jobs failed"
            exit 1
          fi
          
          if [ "${{ needs.release.result }}" == "failure" ]; then
            echo "❌ Release job failed"
            exit 1
          fi
          
          echo "✅ All jobs completed successfully"
